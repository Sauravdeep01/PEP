<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .parent{
            border: 2px solid black;
            justify-content:center;
            justify-items: center;;
            height: 300px;
            width: 600px;
            display: flex;
            margin-top: 30px;
            padding-top: 100px;
        }
        .divs{
            border: 1px solid red;
            width: 20%;
            height: 100px;

        }
        #div1{
            background-color: aqua;
        }
        #div2{
            background-color: wheat;
        }
        #div3{
            background-color: royalblue;
        }
        #div4{
            background-color: teal;
        }
        #div5{
            background-color: salmon;
        }
    </style>
</head>
<body>


    <div class="parent">
        <div class="divs" id="div1">I am a div</div>
        <div class="divs" id="div2">I am a div</div>
        <div class="divs" id="div3">I am a div</div>
        <div class="divs" id="div4">I am a div</div>
        <div class="divs" id="div5">I am a div</div>
    </div>
    
</body>
</html>
