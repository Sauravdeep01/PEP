<!DOCTYPE html>
<html>
<body>

<button onclick="getData()">Get Data</button>


<script>
async function getData() {
    try {
        const res = await fetch("https://jsonplaceholder.typicode.com/posts");
        const data = await res.json();
        alert(JSON.stringify(data));
    }
    catch (error) {
        alert("Error fetching data");
    }
}
</script>
